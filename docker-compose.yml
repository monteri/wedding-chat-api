services:
  postgres:
    image: postgres:15-alpine
    container_name: wedding-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wedding_chat
      POSTGRES_USER: wedding_chat
      POSTGRES_PASSWORD: wedding_chat
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
