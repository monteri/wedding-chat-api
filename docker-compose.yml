services:
  postgres:
    image: postgres:18-alpine
    container_name: wedding-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wedding_chat
      POSTGRES_USER: wedding_chat
      POSTGRES_PASSWORD: wedding_chat
    ports:
      - "5433:5432"
    volumes:
      # Postgres 18+ stores data under versioned dirs beneath this path
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
